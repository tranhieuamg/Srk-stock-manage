<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Warehouse Pro v3</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #d39e00; --purple: #6f42c1; --bg: #f4f7f6; --text: #333; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; text-align: center; background: var(--bg); color: var(--text); }
        
        select, input, textarea { width: 95%; max-width: 400px; padding: 15px; margin: 10px auto; font-size: 1.1rem; border-radius: 8px; border: 1px solid #ccc; background: white; box-sizing: border-box; display: block; }
        
        .sub-section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 20px auto; max-width: 450px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        button { padding: 15px; font-size: 1rem; font-weight: bold; cursor: pointer; color: white; border: none; border-radius: 8px; transition: 0.2s; display: block; margin: 10px auto; width: 95%; max-width: 400px; }
        button:disabled { background-color: #cccccc !important; cursor: not-allowed; opacity: 0.7; }
        
        .btn-unlock { background: var(--primary); }
        .btn-add { background: var(--success); }
        .btn-remove { background: var(--danger); }
        .btn-toggle { background: #6c757d; }
        .btn-purple { background: var(--purple); }
        .btn-cancel { background: #666; }
        
        .btn-group-inline { display: flex; gap: 10px; width: 95%; max-width: 400px; margin: 10px auto; }
        .btn-group-inline button { flex: 1; margin: 0; width: auto; font-size: 0.75rem; padding: 10px 5px; }
        
        .checkbox-container { display: flex; align-items: center; justify-content: flex-start; gap: 10px; margin: 10px auto; padding: 12px; border-radius: 8px; width: 95%; max-width: 400px; box-sizing: border-box; border: 1px solid #ddd; }
        .checkbox-container input { width: 22px; height: 22px; margin: 0; }
        .checkbox-container label { margin: 0; font-size: 0.9rem; flex: 1; text-align: left; }

        @media print {
            body * { visibility: hidden; }
            #qr-modal, #qr-modal * { visibility: visible; }
            #qr-modal { position: absolute; left: 0; top: 0; width: 100%; background: white; }
            .btn-cancel, .btn-unlock { display: none; } /* Hide buttons on the actual print */
        }
        #reader { width: 100%; max-width: 400px; margin: 15px auto; border-radius: 8px; overflow: hidden; background: #000; }
        .status-msg { font-size: 0.85rem; font-weight: bold; margin: 10px 0; display: block; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .preview-box { font-size: 0.75rem; color: #555; background: #e9ecef; padding: 8px; border-radius: 4px; margin-top: 10px; word-break: break-all; }
        .search-results { font-size: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 8px; text-align: left; padding: 10px; margin-top: 10px; max-height: 200px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="login-overlay">
    <h2>System Access</h2>
    <select id="staff-name">
        <option value="" disabled selected>Select Staff</option>
        <option value="Hieu">Hieu</option>
        <option value="Trung">Trung</option>
        <option value="Cuong">Cuong</option>
        <option value="Vinh">Vinh</option>
    </select>
    <input type="password" id="pin-input" placeholder="Enter PIN">
    <button class="btn-unlock" onclick="checkPin()">Unlock System</button>
</div>

<div id="main-app" style="display:none;">
    <div id="dashboard-menu">
        <h2>Dashboard</h2>
        <button class="btn-unlock" onclick="showPage('stock')">📦 Stock Management</button>
        <button class="btn-purple" onclick="showPage('order')">📝 Order Management</button>
        <p onclick="logout()" style="color:grey; text-decoration:underline; cursor:pointer;">Log out</p>
    </div>

    <div id="stock-page" style="display:none;">
        <button class="btn-toggle" onclick="showPage('menu')">⬅ Back</button>
        <div id="scanner-view">
            <div id="reader"></div>
            <button class="btn-toggle" onclick="showManual()">⌨️ Manual Code</button>
        </div>
        <div id="manual-entry-section" style="display:none;">
            <input type="number" id="manual-code-input" placeholder="6-Digit Part Code">
            <button class="btn-unlock" onclick="handleManualSubmit()">Find Part</button>
            <button class="btn-toggle" onclick="showScanner()">📷 Scanner</button>
        </div>

        <div id="controls" class="sub-section" style="display:none;">
            <h3 id="item-name">Checking...</h3>
            <p id="stock-display" style="font-weight: bold; font-size: 1.3rem;"></p>
            <hr>
            <div id="action-selector">
                <div class="btn-group-inline">
                    <button class="btn-add" onclick="setActionMode('IN')">➕ Add</button>
                    <button class="btn-remove" onclick="setActionMode('OUT')">➖ Remove</button>
                </div>
            </div>

            <div id="movement-form" style="display:none;">
                <label>Quantity:</label>
                <input type="number" id="qty" value="1" min="1">
                <input type="text" id="manual-purpose" placeholder="Notes (Internal)">

                <div id="po-link-section" style="display:none;">
                    <label>Addition Scenario:</label>
                    <select id="addition-scenario" onchange="toggleScenario()">
                        <option value="general">General Pool (No Tracking)</option>
                        <option value="contract">Contract / PO Tracked Order</option>
                    </select>

                    <div id="contract-logic-block" style="display:none;">
                        <div class="checkbox-container">
                            <input type="checkbox" id="check-has-po" onchange="togglePOInput()">
                            <label for="check-has-po">PO/Contract Available?</label>
                        </div>
                        <div class="checkbox-container">
                            <input type="checkbox" id="check-batches" onchange="toggleBatchSection()">
                            <label for="check-batches">Delivered in Batches?</label>
                        </div>
                        <div class="checkbox-container">
                            <input type="checkbox" id="check-shared-po" onchange="updateCodePreview()">
                            <label for="check-shared-po">Share PO with other parts?</label>
                        </div>

                        <div class="btn-group-inline">
                            <button type="button" class="btn-purple" onclick="searchSharedPOs()">🔍 Shared POs</button>
                            <button id="batch-search-btn" type="button" class="btn-toggle" style="display:none;" onclick="searchBatches()">🔍 Batches</button>
                        </div>

                        <div id="po-input-block" style="display:none;">
                            <input type="text" id="po-number-input" placeholder="PO Number" oninput="updateCodePreview()">
                            <input type="text" id="po-description" placeholder="PO Description">
                        </div>
                        <input type="number" id="batch-number-input" placeholder="Batch #" value="1" style="display:none;" oninput="updateCodePreview()">
                        
                        <div id="code-preview" class="preview-box">Order ID: N/A</div>
                        <div id="search-results-list" class="search-results" style="display:none;"></div>
                    </div>
                </div>

                <div id="order-link-section" style="display:none;">
                    <select id="removal-reason" onchange="handleReasonChange()">
                        <option value="" disabled selected>Reason for Removal...</option>
                        <option value="For Testing">For Testing</option>
                        <option value="For Post Processing">For Post Processing</option>
                        <option value="For Making an Order">For Making an Order</option>
                    </select>
                    <div id="order-code-input-block" style="display:none;">
                        <input type="number" id="purpose-order" placeholder="6-digit Order Code">
                        <button type="button" class="btn-toggle" onclick="verifyOrderForStock()">Verify Order</button>
                        <p id="order-verify-msg" class="status-msg"></p>
                        <div class="checkbox-container">
                            <input type="checkbox" id="wasted-check">
                            <label for="wasted-check" style="color:var(--danger);">Wasted in assembly?</label>
                        </div>
                    </div>
                </div>

                <button id="final-submit-btn" class="btn-unlock" onclick="submitFinalData()">Confirm Transaction</button>
            </div>
            <button class="btn-cancel" onclick="location.reload()">Cancel</button>
        </div>
    </div>

    <div id="order-page" style="display:none;">
        <button class="btn-toggle" onclick="showPage('menu')">⬅ Back</button>
        <div class="sub-section">
            <h3>New Order Registration</h3>
            <input type="text" id="cust-name" placeholder="Customer Name *">
            <input type="text" id="order-prod" placeholder="Product Model *">
            <input type="text" id="order-po" placeholder="PO # (Optional)">
            <label>Deadline *</label>
            <input type="date" id="order-deadline">
            <button class="btn-add" id="order-submit-btn" onclick="submitNewOrder()">🚀 Create Order</button>
        </div>
    </div>
</div>
    <div id="qr-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:12px; width:85%; max-width:350px;">
            <h3 style="margin-top:0;">Print Label</h3>
            <div id="qrcode-canvas" style="display:flex; justify-content:center; margin:20px 0;"></div>
            <p id="label-text" style="font-size:0.9rem; font-weight:bold; word-break:break-all;"></p>
            <button class="btn-unlock" onclick="window.print()">🖨️ Print / Save</button>
            <button class="btn-cancel" onclick="location.reload()">Done / Close</button>
        </div>
    </div>

<script>
    const MY_M_K = "100110"; 
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEtdCthyH_epfl947GqhDVcrftFYEQyXv11yqlRMRezgcGJsMdkOWOLkKY4a1mkmpi7Q/exec";

    let currentPartId="", currentPartName="", currentAction="", html5QrCode;
    let isOrderValid=false, currentStockValue=0, isPOValid=false;

    window.onload = () => { if(localStorage.getItem("warehouse_authenticated")==="true"){ document.getElementById('login-overlay').style.display='none'; document.getElementById('main-app').style.display='block'; } };

    function checkPin() {
        if (document.getElementById('pin-input').value === MY_M_K) {
            localStorage.setItem("warehouse_authenticated", "true");
            localStorage.setItem("warehouse_staff_name", document.getElementById('staff-name').value);
            location.reload();
        } else alert("Wrong PIN");
    }

    function logout() { localStorage.clear(); location.reload(); }

    function showPage(page) {
        document.getElementById('dashboard-menu').style.display='none'; document.getElementById('stock-page').style.display='none'; document.getElementById('order-page').style.display='none';
        if(html5QrCode && html5QrCode.isScanning) html5QrCode.stop();
        if(page==='menu') document.getElementById('dashboard-menu').style.display='block';
        if(page==='stock') { document.getElementById('stock-page').style.display='block'; startScanner(); }
        if(page==='order') document.getElementById('order-page').style.display='block';
    }

    function startScanner() { if(!html5QrCode) html5QrCode = new Html5Qrcode("reader"); html5QrCode.start({facingMode:"environment"}, {fps:10, qrbox:250}, onScanSuccess); }

    function onScanSuccess(decodedText) {
        const proceed = () => {
            document.getElementById('scanner-view').style.display = 'none';
            document.getElementById('manual-entry-section').style.display = 'none';
            document.getElementById('controls').style.display = 'block';
            
            // LOGIC: Is this a Batch Code or a simple Part Code?
            const isBatchCode = decodedText.includes('_');
            const searchId = isBatchCode ? decodedText.split('_')[0] : decodedText;
            
            currentPartId = searchId;
            
            // If it's a batch, auto-fill the Order Code field in the removal form
            if (isBatchCode) {
                document.getElementById('purpose-order').value = decodedText;
                document.getElementById('order-verify-msg').innerText = "📦 Batch QR Detected";
                document.getElementById('order-verify-msg').style.color = "blue";
                isOrderValid = true; // Pre-verify since the QR is specific
            }
    
            fetch(`${GOOGLE_SCRIPT_URL}?mode=stock&id=${searchId}`)
                .then(res => res.json())
                .then(data => {
                    if(data.found) {
                        currentPartName = data.name;
                        currentStockValue = Number(data.stock);
                        document.getElementById('item-name').innerText = "✅ " + data.name;
                        document.getElementById('stock-display').innerText = "Stock: " + data.stock;
                    } else { alert("Not found"); location.reload(); }
                });
        };
        if (html5QrCode.isScanning) html5QrCode.stop().then(proceed).catch(proceed);
        else proceed();
    }

    function setActionMode(mode) {
        currentAction = mode;
        document.getElementById('action-selector').style.display='none'; document.getElementById('movement-form').style.display='block';
        document.getElementById('po-link-section').style.display = mode==='IN' ? 'block':'none';
        document.getElementById('order-link-section').style.display = mode==='OUT' ? 'block':'none';
    }

    // --- INBOUND (ADD) LOGIC ---
    function toggleScenario() {
        const scenario = document.getElementById('addition-scenario').value;
        document.getElementById('contract-logic-block').style.display = (scenario === 'contract') ? 'block' : 'none';
        updateCodePreview();
    }

    function togglePOInput() {
        document.getElementById('po-input-block').style.display = document.getElementById('check-has-po').checked ? 'block' : 'none';
        updateCodePreview();
    }

    function toggleBatchSection() {
        const isBatched = document.getElementById('check-batches').checked;
        document.getElementById('batch-number-input').style.display = isBatched ? 'block' : 'none';
        document.getElementById('batch-search-btn').style.display = isBatched ? 'block' : 'none';
        updateCodePreview();
    }

    function updateCodePreview() {
        const scenario = document.getElementById('addition-scenario').value;
        const preview = document.getElementById('code-preview');
        if (scenario === 'general') { preview.innerText = "Order ID: N/A"; return "N/A"; }

        const po = document.getElementById('check-has-po').checked ? (document.getElementById('po-number-input').value || "PO_PENDING") : "Temp";
        const share = document.getElementById('check-shared-po').checked ? "SHARED" : "UNIQUE";
        const batch = document.getElementById('check-batches').checked ? ("B" + document.getElementById('batch-number-input').value) : "Single";
        
        const code = `${currentPartId}_${po}_${share}_${batch}`;
        preview.innerText = "Order ID: " + code;
        return code;
    }

    function searchSharedPOs() {
        fetch(`${GOOGLE_SCRIPT_URL}?mode=search_shared_po`).then(res=>res.json()).then(data=>{
            const list = document.getElementById('search-results-list');
            list.style.display = "block";
            if(data.results.length > 0) {
                let html = "<strong>Shared POs Found:</strong><ul>";
                data.results.forEach(i => { html += `<li onclick="applyPO('${i.po}')" style="color:var(--purple); cursor:pointer; margin-bottom:8px;">${i.po} <br><small>${i.desc}</small></li>`; });
                list.innerHTML = html + "</ul>";
            } else list.innerHTML = "No shared POs found.";
        });
    }

    function applyPO(po) {
        document.getElementById('check-has-po').checked = true;
        document.getElementById('po-number-input').value = po;
        document.getElementById('po-input-block').style.display = 'block';
        updateCodePreview();
    }

    function searchBatches() {
        fetch(`${GOOGLE_SCRIPT_URL}?mode=batch_lookup&partId=${currentPartId}`).then(res=>res.json()).then(data=>{
            const list = document.getElementById('search-results-list');
            list.style.display = "block";
            if(data.results.length > 0) {
                list.innerHTML = "<strong>Existing Batches:</strong><br>" + data.results.map(i => i.code).join("<br>");
            } else list.innerHTML = "No existing batches for this part.";
        });
    }

    // --- OUTBOUND (REMOVE) LOGIC ---
    function handleReasonChange() {
        const r = document.getElementById('removal-reason').value;
        document.getElementById('order-code-input-block').style.display = r==="For Making an Order" ? 'block':'none';
        isOrderValid = (r!=="For Making an Order");
    }

    function verifyOrderForStock() {
        const id = document.getElementById('purpose-order').value;
        fetch(`${GOOGLE_SCRIPT_URL}?mode=order_lookup&id=${id}`).then(res=>res.json()).then(data=>{
            const m = document.getElementById('order-verify-msg');
            if(data.found && data.status==="Unfinished"){ m.innerText="✅ Valid: "+data.customer; m.style.color="green"; isOrderValid=true; }
            else { m.innerText="❌ Invalid/Finished"; m.style.color="red"; isOrderValid=false; }
        });
    }

    function submitFinalData() {
        const qty = Number(document.getElementById('qty').value);
        
        // 1. Validation
        if (currentAction === 'OUT') {
            if (qty > currentStockValue) { alert("Insufficient stock!"); return; }
            if (!isOrderValid) { alert("Verify order or reason first!"); return; }
        }
    
        const btn = document.getElementById('final-submit-btn');
        btn.disabled = true; 
        btn.innerText = "⏳ Recording...";
    
        // 2. Prepare Data
        const stockingOrderId = (currentAction === 'IN') ? updateCodePreview() : "";
        const payload = {
            type: "STOCK_MOVE",
            partId: currentPartId,
            partName: currentPartName,
            action: currentAction,
            quantity: qty,
            staffName: localStorage.getItem("warehouse_staff_name"),
            purpose: document.getElementById('manual-purpose').value,
            orderCode: (currentAction === 'OUT') ? (document.getElementById('removal-reason').value === "For Making an Order" ? document.getElementById('purpose-order').value : document.getElementById('removal-reason').value) : "",
            poValue: (currentAction === 'IN') ? (document.getElementById('check-has-po').checked ? document.getElementById('po-number-input').value : "Temp") : "N/A",
            poDescription: (currentAction === 'IN') ? document.getElementById('po-description').value : "",
            stockingOrderId: stockingOrderId,
            wasted: (currentAction === 'OUT' && document.getElementById('wasted-check').checked) ? "Yes" : ""
        };
    
        // 3. Send to Google
        fetch(GOOGLE_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) })
        .then(res => {
            // --- THE FIX IS HERE ---
            if (currentAction === 'IN' && stockingOrderId !== "N/A") {
                // Do NOT reload yet. Generate the QR label first.
                generateLabel(stockingOrderId, currentPartName);
            } else {
                alert("Transaction Recorded!");
                location.reload();
            }
        })
        .catch(err => {
            alert("Error saving data. Please try again.");
            btn.disabled = false;
            btn.innerText = "Confirm Transaction";
        });
    }
    function generateLabel(orderId, partName) {
        const modal = document.getElementById('qr-modal');
        const canvas = document.getElementById('qrcode-canvas');
        
        // 1. Show the modal first
        modal.style.display = 'flex';
        canvas.innerHTML = ""; // Clear old QR
    
        // 2. Add a tiny delay (100ms) to ensure the 'canvas' div is active in the DOM
        setTimeout(() => {
            try {
                // 3. Double check library exists
                if (typeof QRCode === "undefined") {
                    throw new Error("QRCode library not loaded");
                }
    
                new QRCode(canvas, {
                    text: orderId,
                    width: 180,
                    height: 180,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
                
                document.getElementById('label-text').innerHTML = `
                    <strong style="font-size:1.2rem;">${partName}</strong><br>
                    <span style="color:#666;">Batch ID: ${orderId}</span>
                `;
            } catch (e) {
                console.error("QR Generation Error:", e);
                alert("⚠️ Stock saved to Sheet, but QR could not be drawn.\nBatch ID: " + orderId);
            }
        }, 100);
    }
    
    function submitNewOrder() {
        const c=document.getElementById('cust-name').value, p=document.getElementById('order-prod').value, d=document.getElementById('order-deadline').value;
        if(!c || !p || !d){ alert("Required fields missing"); return; }
        fetch(GOOGLE_SCRIPT_URL, { method:"POST", body: JSON.stringify({
            type:"NEW_ORDER", customer:c, product:p, deadline:d, poNumber:document.getElementById('order-po').value
        })}).then(res=>res.json()).then(data=>{ alert(`Order Created: ${data.code}`); location.reload(); });
    }

    function showManual() { document.getElementById('scanner-view').style.display='none'; document.getElementById('manual-entry-section').style.display='block'; }
    function showScanner() { document.getElementById('manual-entry-section').style.display='none'; document.getElementById('scanner-view').style.display='block'; startScanner(); }
    function handleManualSubmit() { const c = document.getElementById('manual-code-input').value; if(c.length===6) onScanSuccess(c); else alert("Enter 6 digits"); }
</script>
</body>
</html>
