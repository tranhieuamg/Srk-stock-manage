<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Warehouse Stock Manager</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; text-align: center; background: #f4f7f6; }
        select {
        width: 80%;
        padding: 15px;
        margin: 10px 0;
        font-size: 1.1rem;
        border-radius: 8px;
        border: 1px solid #ccc;
        background: white;
                }
        /* PIN Overlay Styling */
        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; display: flex;
            flex-direction: column; justify-content: center; align-items: center;
        }

        /* UI Elements */
        #reader { width: 100%; max-width: 400px; margin: 20px auto; border-radius: 8px; overflow: hidden; }
        .controls { display: none; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-top: 20px; }
        input { width: 80%; padding: 15px; margin: 10px 0; font-size: 1.2rem; border: 1px solid #ddd; border-radius: 8px; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        button { padding: 15px 25px; font-size: 1rem; font-weight: bold; cursor: pointer; color: white; border: none; border-radius: 8px; transition: 0.2s; }
        .btn-add { background: var(--success); flex: 1; }
        .btn-remove { background: var(--danger); flex: 1; }
        .btn-unlock { background: var(--primary); width: 80%; }
        
        h2 { color: #333; }
        #item-name { color: var(--primary); margin: 5px 0; }
    </style>
</head>
<body>

<div id="login-overlay">
    <h2>Stock Access</h2>
    <p>Select your name and enter PIN</p>
    
    <select id="staff-name">
        <option value="" disabled selected>Staff's name</option>
        <option value="Hieu">Hieu</option>
        <option value="Trung">Trung</option>
        <option value="Cuong">Cuong</option>
        <option value="Vinh">Vinh</option>
        <option value="???">???</option>
    </select>

    <input type="password" id="pin-input" pattern="\d*" inputmode="numeric" placeholder="PIN Code">
    <button class="btn-unlock" onclick="checkPin()">Unlock System</button>
</div>

    <div id="main-app" style="display:none;">
        <p onclick="logout()" style="color: grey; cursor: pointer; margin-top: 50px; font-size: 0.8rem; text-decoration: underline;">
        Log out / Lock System
        </p>
        <h2>Scan Stock Item</h2>
        <div id="reader"></div>
        
        <div id="controls" class="controls">
            <h3 id="item-name">Searching...</h3>
            <p id="item-id" style="color: #666; font-size: 0.9rem;"></p>
            <p id="stock-display" style="font-weight: bold; font-size: 1.1rem; margin: 10px 0;"></p> ```
            
            <label for="qty">Quantity to Move:</label><br>
            <input type="number" id="qty" value="1" min="1">
            
            <div class="btn-group">
                <button class="btn-add" onclick="submitData('IN')">➕ ADD</button>
                <button class="btn-remove" onclick="submitData('OUT')">➖ REMOVE</button>
            </div>
            <button onclick="location.reload()" style="background:#666; margin-top: 20px; width: 100%;">Cancel / Next Scan</button>
        </div>
    </div>

    <script>
        // ================= CONFIGURATION =================
        const MY_M_K = "100110"; // SET YOUR PASSWORD HERE
        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEtdCthyH_epfl947GqhDVcrftFYEQyXv11yqlRMRezgcGJsMdkOWOLkKY4a1mkmpi7Q/exec";
        // =================================================
let currentPartId = "";
let currentPartName = "";
let html5QrCode; // Global variable to store the scanner instance

        // 1. PIN Check Logic
        // --- NEW: Run this the moment the page loads ---
window.onload = function() {
    if (localStorage.getItem("warehouse_authenticated") === "true") {
        // User already logged in previously, jump to app
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        startScanner();
    }
};

// --- Updated CheckPin to include Name ---
function checkPin() {
    const pin = document.getElementById('pin-input').value;
    const name = document.getElementById('staff-name').value;

    if (!name) {
        alert("Please select your name first.");
        return;
    }

    if (pin === MY_M_K) {
        localStorage.setItem("warehouse_authenticated", "true");
        localStorage.setItem("warehouse_staff_name", name); // Save name locally
        
        document.getElementById('login-overlay').style.display = 'none';
        document.getElementById('main-app').style.display = 'block';
        startScanner();
    } else {
        alert("Incorrect PIN.");
    }
}

// --- OPTIONAL: Add a logout function if you want a "Lock" button ---
function logout() {
    localStorage.removeItem("warehouse_authenticated");
    location.reload();
}
        


// 2. Scanner Logic
function startScanner() {
    // We create a new instance each time so we can control it better
    html5QrCode = new Html5Qrcode("reader");
    
    const config = { fps: 10, qrbox: { width: 250, height: 250 } };

    html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
}

function onScanSuccess(decodedText) {
    if (decodedText.length !== 6) return;

    html5QrCode.stop().then(() => {
        document.getElementById('reader').style.display = 'none';
    });

    currentPartId = decodedText;
    const nameDisplay = document.getElementById('item-name');
    const stockDisplay = document.getElementById('stock-display');
    const controls = document.getElementById('controls');
    
    nameDisplay.innerText = "Checking...";
    stockDisplay.innerText = ""; // Clear old stock
    controls.style.display = 'block';

    fetch(`${GOOGLE_SCRIPT_URL}?id=${decodedText}`)
        .then(res => res.json())
        .then(data => {
            if (data.found) {
                currentPartName = data.name;
                nameDisplay.innerText = "✅ " + currentPartName;
                nameDisplay.style.color = "green";
                
                // DISPLAY THE LIVE STOCK
                stockDisplay.innerText = "Current Stock: " + data.stock + " units";
                stockDisplay.style.color = (data.stock <= 5) ? "red" : "black"; // Turn red if low
                
                document.querySelectorAll('.btn-group button').forEach(b => b.style.display = 'block');
            } else {
                nameDisplay.innerText = "❌ ERROR: " + data.error;
                nameDisplay.style.color = "red";
                stockDisplay.innerText = "";
                document.querySelectorAll('.btn-group button').forEach(b => b.style.display = 'none');
            }
        .catch(err => {
            nameDisplay.innerText = "Connection Error";
            nameDisplay.style.color = "red";
        });
}

// 3. Database Submission Logic
// --- Updated SubmitData to send the Name ---
function submitData(action) {
    const qty = document.getElementById('qty').value;
    const staff = localStorage.getItem("warehouse_staff_name"); // Retrieve saved name

    fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify({
            partId: currentPartId,
            partName: currentPartName,
            action: action,
            quantity: qty,
            staffName: staff // <--- New data field
        })
    })
    .then(() => {
        alert(`Recorded by ${staff}: ${currentPartName} (${action} ${qty})`);
        location.reload(); 
    });
}
    </script>
</body>
</html>
