<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Warehouse Pro v4</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #d39e00; --purple: #6f42c1; --bg: #f4f7f6; --text: #333; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; text-align: center; background: var(--bg); color: var(--text); }
        select, input, textarea { width: 95%; max-width: 400px; padding: 15px; margin: 10px auto; font-size: 1.1rem; border-radius: 8px; border: 1px solid #ccc; background: white; box-sizing: border-box; display: block; }
        .sub-section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 20px auto; max-width: 450px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        button { padding: 15px; font-size: 1rem; font-weight: bold; cursor: pointer; color: white; border: none; border-radius: 8px; transition: 0.2s; display: block; margin: 10px auto; width: 95%; max-width: 400px; }
        button:disabled { background-color: #cccccc !important; cursor: not-allowed; opacity: 0.7; }
        .btn-unlock { background: var(--primary); }
        .btn-add { background: var(--success); }
        .btn-remove { background: var(--danger); }
        .btn-toggle { background: #6c757d; }
        .btn-purple { background: var(--purple); }
        .btn-cancel { background: #666; }
        .btn-download { background: #17a2b8; margin-top: 10px; }
        .btn-group-inline { display: flex; gap: 10px; width: 95%; max-width: 400px; margin: 10px auto; }
        .btn-group-inline button { flex: 1; margin: 0; width: auto; font-size: 0.75rem; padding: 10px 5px; }
        .checkbox-container { display: flex; align-items: center; justify-content: flex-start; gap: 10px; margin: 10px auto; padding: 12px; border-radius: 8px; width: 95%; max-width: 400px; box-sizing: border-box; border: 1px solid #ddd; }
        .checkbox-container input { width: 22px; height: 22px; margin: 0; }
        .checkbox-container label { margin: 0; font-size: 0.9rem; flex: 1; text-align: left; }
        #reader { width: 100%; max-width: 400px; margin: 15px auto; border-radius: 8px; overflow: hidden; background: #000; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .preview-box { font-size: 0.75rem; color: #555; background: #e9ecef; padding: 8px; border-radius: 4px; margin-top: 10px; word-break: break-all; }
        .search-results { font-size: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 8px; text-align: left; padding: 10px; margin-top: 10px; max-height: 200px; overflow-y: auto; }
        #final-combined-image { display: block; margin: 20px auto; height: 26mm; width: auto; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        
        @media print {
            body * { visibility: hidden !important; display: none !important; }
            #qr-modal, #qr-modal * { visibility: visible !important; display: flex !important; }
            #qr-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white !important; }
            #qr-modal > div { border: none !important; box-shadow: none !important; width: 100% !important; max-width: none !important; padding: 0 !important; margin: 0 !important; }
            #final-combined-image { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); height: 26mm !important; width: auto !important; }
            #modal-btns, #manual-save-tip, h3, #label-text { display: none !important; }
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <h2>System Access</h2>
    <select id="staff-name">
        <option value="" disabled selected>Select Staff</option>
        <option value="Hieu">Hieu</option>
        <option value="Trung">Trung</option>
        <option value="Cuong">Cuong</option>
        <option value="Vinh">Vinh</option>
    </select>
    <input type="password" id="pin-input" placeholder="Enter PIN">
    <button class="btn-unlock" onclick="checkPin()">Unlock System</button>
</div>

<div id="main-app" style="display:none;">
    <div id="dashboard-menu">
        <h2>Dashboard</h2>
        <button class="btn-unlock" onclick="showPage('stock')">📦 Stock Management</button>
        <button class="btn-purple" onclick="showPage('order')">📝 Order Management</button>
        <button class="btn-toggle" style="background:#00bcd4;" onclick="showPage('task')">📋 Task Management</button>
        <p onclick="logout()" style="color:grey; text-decoration:underline; cursor:pointer;">Log out</p>
    </div>

    <div id="stock-page" style="display:none;">
        <button class="btn-toggle" onclick="showPage('menu')">⬅ Back</button>
        <div id="scanner-view">
            <div id="reader"></div>
            <button class="btn-toggle" onclick="showManual()">⌨️ Manual Code</button>
        </div>
        <div id="manual-entry-section" style="display:none;">
            <input type="text" id="manual-code-input" placeholder="Part ID or Batch ID">
            <button class="btn-unlock" onclick="handleManualSubmit()">Find Part</button>
            <button class="btn-toggle" onclick="showScanner()">📷 Scanner</button>
        </div>

        <div id="controls" class="sub-section" style="display:none;">
            <h3 id="item-name">Checking...</h3>
            <p id="item-id" style="color: #666; font-size: 0.8rem;"></p>
            <p id="stock-display" style="font-weight: bold; font-size: 1.3rem;"></p>
            <hr>
            <div id="action-selector">
                <div class="btn-group-inline">
                    <button class="btn-add" onclick="setActionMode('IN')">➕ Add</button>
                    <button class="btn-remove" onclick="setActionMode('OUT')">➖ Remove</button>
                </div>
            </div>

            <div id="movement-form" style="display:none;">
                <h4 id="form-title">Moving Stock</h4>
                <label>Quantity:</label>
                <input type="number" id="qty" value="1" min="1">
                <input type="text" id="manual-purpose" placeholder="Notes (Internal)">

                <div id="po-link-section" style="display:none;">
                    <label>Addition Scenario:</label>
                    <select id="addition-scenario" onchange="toggleScenario()">
                        <option value="general">General Pool (No Tracking)</option>
                        <option value="contract">Contract / PO Tracked Order</option>
                    </select>

                    <div id="contract-logic-block" style="display:none;">
                        <div class="checkbox-container">
                            <input type="checkbox" id="check-has-po" onchange="togglePOInput()">
                            <label for="check-has-po">PO/Contract Available?</label>
                        </div>
                        <div class="checkbox-container">
                            <input type="checkbox" id="check-batches" onchange="toggleBatchSection()">
                            <label for="check-batches">Delivered in Batches?</label>
                        </div>
                        <div class="checkbox-container">
                            <input type="checkbox" id="check-shared-po" onchange="updateCodePreview()">
                            <label for="check-shared-po">Share PO with other parts?</label>
                        </div>
                        <div class="btn-group-inline">
                            <button type="button" class="btn-purple" onclick="searchSharedPOs()">🔍 Shared POs</button>
                            <button id="batch-search-btn" type="button" class="btn-toggle" style="display:none;" onclick="searchBatches()">🔍 Batches</button>
                        </div>
                        <div id="po-input-block" style="display:none;">
                            <input type="text" id="po-number-input" placeholder="PO Number" oninput="updateCodePreview()">
                            <input type="text" id="po-description" placeholder="PO Description">
                        </div>
                        <input type="number" id="batch-number-input" placeholder="Batch #" value="1" style="display:none;" oninput="updateCodePreview()">
                        <div id="code-preview" class="preview-box">Order ID: N/A</div>
                        <div id="search-results-list" class="search-results" style="display:none;"></div>
                    </div>
                </div>

                <div id="order-link-section" style="display:none;">
                    <label>Reason for Removal:</label>
                    <select id="removal-reason" onchange="handleReasonChange()">
                        <option value="" disabled selected>Select reason...</option>
                        <option value="For Testing">For Testing</option>
                        <option value="For Post Processing">For Post Processing</option>
                        <option value="For Making an Order">For Making an Order</option>
                    </select>
                    <div id="order-code-input-block" style="display:none;">
                        <label>Select Active Order:</label>
                        <select id="purpose-order" onchange="checkOrderSelection()">
                            <option value="" disabled selected>Loading Active Orders...</option>
                        </select>
                        <div class="checkbox-container">
                            <input type="checkbox" id="wasted-check">
                            <label for="wasted-check" style="color:var(--danger);">Wasted in assembly?</label>
                        </div>
                    </div>
                </div>
                <button id="final-submit-btn" class="btn-unlock" onclick="submitFinalData()" style="margin-top:20px;">Confirm Transaction</button>
            </div>
            <button class="btn-cancel" onclick="resetPage()">Cancel</button>
        </div>
    </div>

    <div id="order-page" style="display:none;">
        <button class="btn-toggle" onclick="showPage('menu')">⬅ Back</button>
        <div class="sub-section">
            <h3>New Order Registration</h3>
            <input type="text" id="cust-name" placeholder="Customer Name *">
            <input type="text" id="order-prod" placeholder="Product Model *">
            <textarea id="order-details" placeholder="Details"></textarea>
            <input type="text" id="order-po" placeholder="PO # (Optional)">
            <label>Deadline *</label>
            <input type="date" id="order-deadline">
            <button class="btn-add" id="order-submit-btn" onclick="submitNewOrder()">🚀 Create Order</button>
        </div>
        <div class="sub-section" style="border-top: 4px solid var(--purple);">
            <h3>Update Order Status</h3>
            <div style="margin-bottom: 10px;">
                <input type="number" id="search-order-id" placeholder="Enter 6-digit Order Code">
                <button type="button" class="btn-unlock" onclick="findOrderForEdit(document.getElementById('search-order-id').value)">🔍 Search by ID</button>
            </div>
            <div style="margin: 15px 0; color: #888; font-size: 0.8rem;">— OR —</div>
            <div style="margin-bottom: 10px;">
                <button type="button" class="btn-purple" onclick="fetchOrdersForUpdate()">📋 Fetch Unfinished List</button>
                <select id="unfinished-order-list" style="display:none; margin-top:10px;" onchange="findOrderForEdit(this.value)">
                    <option value="" disabled selected>Select an order...</option>
                </select>
            </div>
            <div id="order-edit-controls" style="display:none; margin-top:15px; background:#f9f9f9; padding:15px; border-radius:8px; text-align: left; border: 1px solid #ddd;">
                <p><strong>Order ID:</strong> <span id="edit-id-display" style="color:var(--purple); font-weight:bold;"></span></p>
                <p><strong>Customer:</strong> <span id="edit-cust"></span></p>
                <p><strong>Product:</strong> <span id="edit-prod"></span></p>
                <p><strong>Status:</strong> <span id="edit-status" style="font-weight: bold;"></span></p>
                <button type="button" id="status-toggle-btn" style="width:100%; margin-top:10px;" onclick="toggleOrderStatus()"></button>
            </div>
        </div>
    </div>

    <div id="task-page" style="display:none;">
        <button class="btn-toggle" onclick="showPage('menu')">⬅ Back</button>
        <div id="task-menu">
            <button class="btn-add" onclick="showTaskAction('add')">➕ Add a New Task</button>
            <button class="btn-purple" onclick="showTaskAction('update')">🔄 Update Task Status</button>
        </div>
        <div id="add-task-section" class="sub-section" style="display:none;">
            <h3>Create New Task</h3>
            <input type="text" id="task-content" placeholder="What needs to be done?">
            <label>Link to Order/Project:</label>
            <div class="btn-group-inline">
                <button type="button" class="btn-toggle" onclick="fetchOrdersForTasks()">Load Orders</button>
            </div>
            <select id="task-order-link">
                <option value="R&D Project">R&D Project</option>
            </select>
            <label>Assign to (PIC):</label>
            <select id="task-pic">
                <option value="Hieu">Hieu</option>
                <option value="Trung">Trung</option>
                <option value="Cuong">Cuong</option>
                <option value="Vinh">Vinh</option>
            </select>
            <label>Task Deadline:</label>
            <input type="date" id="task-deadline">
            <button class="btn-add" id="task-submit-btn" onclick="submitNewTask()">🚀 Submit Task</button>
            <button class="btn-cancel" onclick="showTaskAction('menu')">Cancel</button>
        </div>
        <div id="update-task-section" class="sub-section" style="display:none;">
            <h3>Close Task</h3>
            <button type="button" class="btn-purple" onclick="fetchActiveTasks()">Refresh Task List</button>
            <select id="unfinished-task-list" style="margin-top:15px;">
                <option value="" disabled selected>Select a task to finish...</option>
            </select>
            <button class="btn-add" id="task-update-btn" onclick="submitTaskUpdate()">✅ Mark as Finished</button>
            <button class="btn-cancel" onclick="showTaskAction('menu')">Cancel</button>
        </div>
    </div>
</div>

<div id="qr-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center;">
    <div style="background:white; padding:20px; border-radius:12px; width:85%; max-width:350px; text-align:center;">
        <div id="label-capture-area" style="background:white; padding:10px;">
            <div id="qrcode-canvas" style="display:block; margin:0 auto;"></div>
            <p id="label-text" style="font-size:1rem; font-weight:bold; color:black; margin-top:10px; word-break:break-all;"></p>
        </div>
        <img id="final-combined-image" style="display:none; width:100%; height:auto; margin-bottom:15px; border:1px solid #eee;">
        <div id="modal-btns">
            <button type="button" class="btn-unlock" onclick="window.print()">🖨️ Print Label</button>
            <button type="button" class="btn-download" onclick="downloadQR(event)">💾 Download to Gallery</button>
            <button type="button" class="btn-cancel" onclick="resetPage()">Done / Next Scan</button>
        </div>
        <p id="manual-save-tip" style="font-size:0.75rem; color:#666; margin-top:10px;">Tip: Long-Press the image above to save manually.</p>
    </div>
</div>

<script>
    const MY_M_K = "100110"; 
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEtdCthyH_epfl947GqhDVcrftFYEQyXv11yqlRMRezgcGJsMdkOWOLkKY4a1mkmpi7Q/exec";

    let currentPartId="", currentPartName="", currentAction="", html5QrCode, scannedBatchId="";
    let isOrderValid=false, currentStockValue=0, generatedInId = "";
    let currentEditOrderCode = "", currentEditStatus = "";

    window.onload = () => { if(localStorage.getItem("warehouse_authenticated")==="true"){ document.getElementById('login-overlay').style.display='none'; document.getElementById('main-app').style.display='block'; fetchActiveOrders(); } };

    function checkPin() { if (document.getElementById('pin-input').value === MY_M_K) { localStorage.setItem("warehouse_authenticated", "true"); localStorage.setItem("warehouse_staff_name", document.getElementById('staff-name').value); location.reload(); } else alert("Denied"); }
    function logout() { localStorage.clear(); location.reload(); }

    function showPage(page) {
        // 1. Hide every top-level section first
        document.getElementById('dashboard-menu').style.display = 'none'; 
        document.getElementById('stock-page').style.display = 'none'; 
        document.getElementById('order-page').style.display = 'none';
        document.getElementById('task-page').style.display = 'none';
        
        // 2. Stop scanner if moving away from Stock
        if(html5QrCode && html5QrCode.isScanning && page !== 'stock') html5QrCode.stop();
    
        // 3. Show the requested page
        if(page === 'menu') {
            document.getElementById('dashboard-menu').style.display = 'block';
        } else if(page === 'stock') { 
            document.getElementById('stock-page').style.display = 'block';
            startScanner(); 
        } else if(page === 'order') {
            document.getElementById('order-page').style.display = 'block';
        } else if(page === 'task') {
            document.getElementById('task-page').style.display = 'block';
            // FIX: Always reset the Task internal menu when entering this page
            showTaskAction('menu'); 
        }
    }

    // FIX: Optimized "Next Scan" function
    function resetPage() {
        document.getElementById('qr-modal').style.display = 'none';
        document.getElementById('controls').style.display = 'none';
        document.getElementById('movement-form').style.display = 'none';
        document.getElementById('action-selector').style.display = 'block';
        document.getElementById('scanner-view').style.display = 'block';
        document.getElementById('manual-entry-section').style.display = 'none';
        
        // Clear variables
        currentPartId = ""; scannedBatchId = "";
        
        if(document.getElementById('stock-page').style.display === 'block') {
            startScanner();
        } else {
            showPage('stock');
        }
    }

    function showTaskAction(action) {
        // This ensures ONLY the chosen sub-section is visible
        document.getElementById('task-menu').style.display = (action === 'menu') ? 'block' : 'none';
        document.getElementById('add-task-section').style.display = (action === 'add') ? 'block' : 'none';
        document.getElementById('update-task-section').style.display = (action === 'update') ? 'block' : 'none';
    }

    function fetchActiveTasks() {
        const select = document.getElementById('unfinished-task-list');
        const btn = event.target;
        
        btn.disabled = true;
        btn.innerText = "⏳ Loading...";
    
        fetch(`${GOOGLE_SCRIPT_URL}?mode=active_tasks`)
            .then(res => res.json())
            .then(data => {
                btn.disabled = false;
                btn.innerText = "Refresh Task List";
                
                select.innerHTML = '<option value="" disabled selected>Select a task to finish...</option>';
                
                if (data.tasks && data.tasks.length > 0) {
                    data.tasks.forEach(t => {
                        // This creates a clean label: "PIC: Task (Order #)"
                        select.innerHTML += `<option value="${t.rowIndex}">${t.pic}: ${t.content} [${t.order}]</option>`;
                    });
                } else {
                    alert("No unfinished tasks found in the Spreadsheet.");
                }
            })
            .catch(err => {
                console.error("Task Fetch Error:", err);
                btn.disabled = false;
                btn.innerText = "Refresh Task List";
                alert("Connection error. Is the Script URL correct?");
            });
    }
    
    function fetchActiveOrders() {
        const select = document.getElementById('purpose-order');
        select.innerHTML = '<option value="" disabled selected>⏳ Fetching...</option>';
        fetch(`${GOOGLE_SCRIPT_URL}?mode=active_orders`)
            .then(res => res.json())
            .then(data => {
                if (data.orders && data.orders.length > 0) {
                    let html = '<option value="" disabled selected>Select an Active Order...</option>';
                    data.orders.forEach(order => { html += `<option value="${order.code}">${order.code} - ${order.customer}</option>`; });
                    select.innerHTML = html;
                } else select.innerHTML = '<option value="" disabled selected>No Orders Found</option>';
            });
    }

    function startScanner() {
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
        if (html5QrCode.isScanning) return; // Prevent double start

        const config = { 
            fps: 20, 
            qrbox: (w, h) => { return { width: w * 0.8, height: h * 0.4 }; },
            videoConstraints: { facingMode: "environment" }
        };

        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess)
        .catch(err => { console.error("Scanner Error", err); });
    }

    function onScanSuccess(code) {
        const proceed = () => {
            document.getElementById('scanner-view').style.display = 'none';
            document.getElementById('controls').style.display = 'block';
            const isBatch = code.includes('_');
            currentPartId = isBatch ? code.split('_')[0] : code;
            scannedBatchId = isBatch ? code : "";
            const mode = isBatch ? "batch_info" : "stock";

            fetch(`${GOOGLE_SCRIPT_URL}?mode=${mode}&id=${code}`).then(res=>res.json()).then(data=>{
                if(data.found){
                    currentPartName=data.name; currentStockValue=Number(data.stock);
                    document.getElementById('item-name').innerText="✅ "+data.name;
                    document.getElementById('stock-display').innerText=(isBatch ? "Batch: " : "Total: ") + data.stock;
                    document.getElementById('item-id').innerText=code;
                } else { alert("Not Found"); resetPage(); }
            });
        };
        if(html5QrCode && html5QrCode.isScanning) html5QrCode.stop().then(proceed).catch(proceed); else proceed();
    }

    function setActionMode(mode) {
        currentAction = mode;
        document.getElementById('action-selector').style.display='none'; 
        document.getElementById('movement-form').style.display='block';
        document.getElementById('po-link-section').style.display = mode==='IN' ? 'block':'none';
        document.getElementById('order-link-section').style.display = mode==='OUT' ? 'block':'none';
        if(mode === 'OUT') fetchActiveOrders();
    }

    function toggleScenario() { document.getElementById('contract-logic-block').style.display = (document.getElementById('addition-scenario').value === 'contract') ? 'block' : 'none'; updateCodePreview(); }
    function togglePOInput() { document.getElementById('po-input-block').style.display = document.getElementById('check-has-po').checked ? 'block' : 'none'; updateCodePreview(); }
    function toggleBatchSection() { const b = document.getElementById('check-batches').checked; document.getElementById('batch-number-input').style.display = b ? 'block' : 'none'; document.getElementById('batch-search-btn').style.display = b ? 'block' : 'none'; updateCodePreview(); }

    function updateCodePreview() {
        if (document.getElementById('addition-scenario').value === 'general') return "N/A";
        const po = document.getElementById('check-has-po').checked ? (document.getElementById('po-number-input').value || "PO_PENDING") : "Temp";
        const share = document.getElementById('check-shared-po').checked ? "SHARED" : "UNIQUE";
        const batch = document.getElementById('check-batches').checked ? ("B" + document.getElementById('batch-number-input').value) : "Single";
        const code = `${currentPartId}_${po}_${share}_${batch}`;
        document.getElementById('code-preview').innerText = "Order ID: " + code; return code;
    }

    function submitFinalData() {
        const qty = Number(document.getElementById('qty').value);
        if(currentAction==='OUT' && qty > currentStockValue) { alert("Not enough stock!"); return; }
        
        const btn = document.getElementById('final-submit-btn'); btn.disabled = true;
        const targetInId = (currentAction === 'IN') ? updateCodePreview() : "";
        generatedInId = targetInId;

        const payload = {
            type: "STOCK_MOVE", partId: currentPartId, partName: currentPartName, action: currentAction, quantity: qty,
            staffName: localStorage.getItem("warehouse_staff_name"), purpose: document.getElementById('manual-purpose').value,
            orderCode: (currentAction==='OUT') ? document.getElementById('purpose-order').value : "",
            poValue: (currentAction==='IN') ? document.getElementById('po-number-input').value : "N/A",
            stockingOrderId: (currentAction==='IN') ? targetInId : scannedBatchId
        };

        fetch(GOOGLE_SCRIPT_URL, { method:"POST", body: JSON.stringify(payload) }).then(()=> { 
            if (currentAction === 'IN' && targetInId !== "N/A") { generateLabel(targetInId, currentPartName); } 
            else { alert("Saved!"); resetPage(); }
        });
    }

    function generateLabel(orderId, partName) {
        const modal = document.getElementById('qr-modal'); const canvas = document.getElementById('qrcode-canvas');
        modal.style.display = 'flex'; canvas.innerHTML = ""; 
        new QRCode(canvas, { text: orderId, width: 300, height: 300, correctLevel : QRCode.CorrectLevel.H });
        document.getElementById('label-text').innerHTML = `${partName}<br>${orderId}`;
        setTimeout(() => {
            html2canvas(document.getElementById('label-capture-area'), { scale: 2 }).then(orig => {
                const rot = document.createElement('canvas'); const ctx = rot.getContext('2d');
                rot.width = orig.height; rot.height = orig.width;
                ctx.translate(0, orig.width); ctx.rotate(-Math.PI / 2); ctx.drawImage(orig, 0, 0);
                document.getElementById('label-capture-area').style.display = 'none';
                const img = document.getElementById('final-combined-image');
                img.src = rot.toDataURL("image/png"); img.style.display = 'block';
            });
        }, 600);
    }

    function downloadQR(e) {
        e.preventDefault();
        const img = document.getElementById('final-combined-image');
        const link = document.createElement('a');
        link.href = img.src; link.download = `Label_${generatedInId}.png`;
        document.body.appendChild(link); link.click(); document.body.removeChild(link);
    }

    function fetchOrdersForUpdate() {
        const select = document.getElementById('unfinished-order-list');
        fetch(`${GOOGLE_SCRIPT_URL}?mode=active_orders`).then(res => res.json()).then(data => {
            select.style.display = "block";
            select.innerHTML = '<option value="" disabled selected>Select Order</option>';
            data.orders.forEach(order => { select.innerHTML += `<option value="${order.code}">${order.code} - ${order.customer}</option>`; });
        });
    }

    function findOrderForEdit(id) {
        fetch(`${GOOGLE_SCRIPT_URL}?mode=order_lookup&id=${id}`).then(res => res.json()).then(data => {
            if (data.found) {
                currentEditOrderCode = id; currentEditStatus = data.status;
                document.getElementById('edit-cust').innerText = data.customer;
                document.getElementById('edit-status').innerText = data.status;
                document.getElementById('order-edit-controls').style.display = 'block';
                document.getElementById('status-toggle-btn').innerText = data.status === "Unfinished" ? "Finish" : "Open";
            }
        });
    }

    function toggleOrderStatus() {
        const newStatus = currentEditStatus === "Unfinished" ? "Finished" : "Unfinished";
        fetch(GOOGLE_SCRIPT_URL, { method: "POST", body: JSON.stringify({ type: "UPDATE_ORDER_STATUS", orderCode: currentEditOrderCode, newStatus: newStatus })
        }).then(() => location.reload());
    }

    function handleManualSubmit() { onScanSuccess(document.getElementById('manual-code-input').value); }
    function showManual() { document.getElementById('scanner-view').style.display='none'; document.getElementById('manual-entry-section').style.display='block'; }
    function showScanner() { document.getElementById('manual-entry-section').style.display='none'; document.getElementById('scanner-view').style.display='block'; startScanner(); }

    // Task Management functions omitted for brevity but should follow the same pattern
</script>
</body>
</html>
