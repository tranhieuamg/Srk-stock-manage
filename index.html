<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Warehouse Pro v4</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #d39e00; --purple: #6f42c1; --bg: #f4f7f6; --text: #333; }
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 20px; text-align: center; background: var(--bg); color: var(--text); }
        select, input, textarea { width: 95%; max-width: 400px; padding: 15px; margin: 10px auto; font-size: 1.1rem; border-radius: 8px; border: 1px solid #ccc; background: white; box-sizing: border-box; display: block; }
        .sub-section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin: 20px auto; max-width: 450px; }
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        button { padding: 15px; font-size: 1rem; font-weight: bold; cursor: pointer; color: white; border: none; border-radius: 8px; transition: 0.2s; display: block; margin: 10px auto; width: 95%; max-width: 400px; }
        button:disabled { background-color: #cccccc !important; cursor: not-allowed; opacity: 0.7; }
        .btn-unlock { background: var(--primary); }
        .btn-add { background: var(--success); }
        .btn-remove { background: var(--danger); }
        .btn-toggle { background: #6c757d; }
        .btn-purple { background: var(--purple); }
        .btn-cancel { background: #666; }
        
        /* Fixed Downloader Button Color */
        .btn-download { background: #17a2b8; margin-top: 10px; }
        
        .btn-group-inline { display: flex; gap: 10px; width: 95%; max-width: 400px; margin: 10px auto; }
        .btn-group-inline button { flex: 1; margin: 0; width: auto; font-size: 0.75rem; padding: 10px 5px; }
        .checkbox-container { display: flex; align-items: center; justify-content: flex-start; gap: 10px; margin: 10px auto; padding: 12px; border-radius: 8px; width: 95%; max-width: 400px; box-sizing: border-box; border: 1px solid #ddd; }
        .checkbox-container input { width: 22px; height: 22px; margin: 0; }
        .checkbox-container label { margin: 0; font-size: 0.9rem; flex: 1; text-align: left; }
        #reader { width: 100%; max-width: 400px; margin: 15px auto; border-radius: 8px; overflow: hidden; background: #000; }
        .status-msg { font-size: 0.85rem; font-weight: bold; margin: 10px 0; display: block; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
        .preview-box { font-size: 0.75rem; color: #555; background: #e9ecef; padding: 8px; border-radius: 4px; margin-top: 10px; word-break: break-all; }
        .search-results { font-size: 0.8rem; background: #fff; border: 1px solid #ddd; border-radius: 8px; text-align: left; padding: 10px; margin-top: 10px; max-height: 200px; overflow-y: auto; }
        
       /* Styling for the snapshot display */
        #final-combined-image {
            display: block;
            margin: 20px auto;
            /* This ensures the image stays within your label height constraint */
            height: 26mm; 
            width: auto;
            border: 1px solid #eee;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        
        /* FIX: THE PRINTING FUNCTION */
        @media print {
            /* Hide the entire web app */
            body * { visibility: hidden !important; display: none !important; }
            
            /* Show ONLY the modal and the image */
            #qr-modal, #qr-modal * { 
                visibility: visible !important; 
                display: flex !important; 
            }
            
            #qr-modal {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: white !important;
            }
        
            /* Target the specific container for the image */
            #qr-modal > div {
                border: none !important;
                box-shadow: none !important;
                width: 100% !important;
                max-width: none !important;
                padding: 0 !important;
                margin: 0 !important;
            }
        
            #final-combined-image {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                height: 26mm !important; /* Forces 26mm height on paper */
                width: auto !important;
            }
        
            /* Hide UI buttons and text during print */
            #modal-btns, #manual-save-tip, h3, #label-text { display: none !important; }
        }
    </style>
</head>
<body>

<div id="login-overlay">
    <h2>System Access</h2>
    <select id="staff-name">
        <option value="" disabled selected>Select Staff</option>
        <option value="Hieu">Hieu</option>
        <option value="Trung">Trung</option>
        <option value="Cuong">Cuong</option>
        <option value="Vinh">Vinh</option>
    </select>
    <input type="password" id="pin-input" placeholder="Enter PIN">
    <button class="btn-unlock" onclick="checkPin()">Unlock System</button>
</div>

<div id="main-app" style="display:none;">
    <div id="dashboard-menu">
        <h2>Dashboard</h2>
        <button class="btn-unlock" onclick="showPage('stock')">📦 Stock Management</button>
        <button class="btn-purple" onclick="showPage('order')">📝 Order Management</button>
        <p onclick="logout()" style="color:grey; text-decoration:underline; cursor:pointer;">Log out</p>
    </div>

    <div id="stock-page" style="display:none;">
        <button class="btn-toggle" onclick="showPage('menu')">⬅ Back</button>
        <div id="scanner-view">
            <div id="reader"></div>
            <button class="btn-toggle" onclick="showManual()">⌨️ Manual Code</button>
        </div>
        <div id="manual-entry-section" style="display:none;">
            <input type="text" id="manual-code-input" placeholder="Part ID or Batch ID (e.g. 123456_...)">
            <button class="btn-unlock" onclick="handleManualSubmit()">Find Part</button>
            <button class="btn-toggle" onclick="showScanner()">📷 Scanner</button>
        </div>

        <div id="controls" class="sub-section" style="display:none;">
            <h3 id="item-name">Checking...</h3>
            <p id="item-id" style="color: #666; font-size: 0.8rem;"></p>
            <p id="stock-display" style="font-weight: bold; font-size: 1.3rem;"></p>
            <hr>
            <div id="action-selector">
                <div class="btn-group-inline">
                    <button class="btn-add" onclick="setActionMode('IN')">➕ Add</button>
                    <button class="btn-remove" onclick="setActionMode('OUT')">➖ Remove</button>
                </div>
            </div>

            <div id="movement-form" style="display:none;">
                <h4 id="form-title">Moving Stock</h4>
                <label>Quantity:</label>
                <input type="number" id="qty" value="1" min="1">
                <input type="text" id="manual-purpose" placeholder="Notes (Internal)">

                <div id="po-link-section" style="display:none;">
                    <label>Addition Scenario:</label>
                    <select id="addition-scenario" onchange="toggleScenario()">
                        <option value="general">General Pool (No Tracking)</option>
                        <option value="contract">Contract / PO Tracked Order</option>
                    </select>

                    <div id="contract-logic-block" style="display:none;">
                        <div class="checkbox-container">
                            <input type="checkbox" id="check-has-po" onchange="togglePOInput()">
                            <label for="check-has-po">PO/Contract Available?</label>
                        </div>
                        <div class="checkbox-container">
                            <input type="checkbox" id="check-batches" onchange="toggleBatchSection()">
                            <label for="check-batches">Delivered in Batches?</label>
                        </div>
                        <div class="checkbox-container">
                            <input type="checkbox" id="check-shared-po" onchange="updateCodePreview()">
                            <label for="check-shared-po">Share PO with other parts?</label>
                        </div>
                        <div class="btn-group-inline">
                            <button type="button" class="btn-purple" onclick="searchSharedPOs()">🔍 Shared POs</button>
                            <button id="batch-search-btn" type="button" class="btn-toggle" style="display:none;" onclick="searchBatches()">🔍 Batches</button>
                        </div>
                        <div id="po-input-block" style="display:none;">
                            <input type="text" id="po-number-input" placeholder="PO Number" oninput="updateCodePreview()">
                            <input type="text" id="po-description" placeholder="PO Description">
                        </div>
                        <input type="number" id="batch-number-input" placeholder="Batch #" value="1" style="display:none;" oninput="updateCodePreview()">
                        <div id="code-preview" class="preview-box">Order ID: N/A</div>
                        <div id="search-results-list" class="search-results" style="display:none;"></div>
                    </div>
                </div>

                <div id="order-link-section" style="display:none;">
                    <label>Reason for Removal:</label>
                    <select id="removal-reason" onchange="handleReasonChange()">
                        <option value="" disabled selected>Select reason...</option>
                        <option value="For Testing">For Testing</option>
                        <option value="For Post Processing">For Post Processing</option>
                        <option value="For Making an Order">For Making an Order</option>
                    </select>
                    <div id="order-code-input-block" style="display:none;">
                        <label>Select Active Order:</label>
                        <select id="purpose-order" onchange="checkOrderSelection()">
                            <option value="" disabled selected>Loading Active Orders...</option>
                        </select>
                        <div class="checkbox-container">
                            <input type="checkbox" id="wasted-check">
                            <label for="wasted-check" style="color:var(--danger);">Wasted in assembly?</label>
                        </div>
                    </div>
                </div>
                <button id="final-submit-btn" class="btn-unlock" onclick="submitFinalData()" style="margin-top:20px;">Confirm Transaction</button>
            </div>
            <button class="btn-cancel" onclick="location.reload()">Cancel</button>
        </div>
    </div>

    <div id="order-page" style="display:none;">
        <button class="btn-toggle" onclick="showPage('menu')">⬅ Back</button>
        <div class="sub-section">
            <h3>New Order Registration</h3>
            <input type="text" id="cust-name" placeholder="Customer Name *">
            <input type="text" id="order-prod" placeholder="Product Model *">
            <textarea id="order-details" placeholder="Details"></textarea>
            <input type="text" id="order-po" placeholder="PO # (Optional)">
            <label>Deadline *</label>
            <input type="date" id="order-deadline">
            <button class="btn-add" id="order-submit-btn" onclick="submitNewOrder()">🚀 Create Order</button>
        </div>
        <div class="sub-section" style="border-top: 4px solid var(--purple);">
            <h3>Update Order Status</h3>
            
            <div style="margin-bottom: 10px;">
                <input type="number" id="search-order-id" placeholder="Enter 6-digit Order Code">
                <button type="button" class="btn-unlock" onclick="findOrderForEdit(document.getElementById('search-order-id').value)">🔍 Search by ID</button>
            </div>
        
            <div style="margin: 15px 0; color: #888; font-size: 0.8rem;">— OR —</div>
        
            <div style="margin-bottom: 10px;">
                <button type="button" class="btn-purple" onclick="fetchOrdersForUpdate()">📋 Fetch Unfinished List</button>
                <select id="unfinished-order-list" style="display:none; margin-top:10px;" onchange="findOrderForEdit(this.value)">
                    <option value="" disabled selected>Select an order...</option>
                </select>
            </div>
            
            <div id="order-edit-controls" style="display:none; margin-top:15px; background:#f9f9f9; padding:15px; border-radius:8px; text-align: left; border: 1px solid #ddd;">
                <p><strong>Order ID:</strong> <span id="edit-id-display" style="color:var(--purple); font-weight:bold;"></span></p>
                <p><strong>Customer:</strong> <span id="edit-cust"></span></p>
                <p><strong>Product:</strong> <span id="edit-prod"></span></p>
                <p><strong>Status:</strong> <span id="edit-status" style="font-weight: bold;"></span></p>
                <button type="button" id="status-toggle-btn" style="width:100%; margin-top:10px;" onclick="toggleOrderStatus()"></button>
            </div>
        </div>
    </div>
</div>

<div id="qr-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center;">
    <div style="background:white; padding:20px; border-radius:12px; width:85%; max-width:350px; text-align:center;">
        
        <div id="label-capture-area" style="background:white; padding:10px;">
            <div id="qrcode-canvas" style="display:block; margin:0 auto;"></div>
            <p id="label-text" style="font-size:1rem; font-weight:bold; color:black; margin-top:10px; word-break:break-all;"></p>
        </div>

        <img id="final-combined-image" style="display:none; width:100%; height:auto; margin-bottom:15px; border:1px solid #eee;">

        <div id="modal-btns">
            <button type="button" class="btn-unlock" onclick="window.print()">🖨️ Print Label</button>
            <button type="button" class="btn-download" onclick="downloadQR(event)">💾 Download to Gallery</button>
            <button type="button" class="btn-cancel" onclick="location.reload()">Done / Next Scan</button>
        </div>
        
        <p id="manual-save-tip" style="font-size:0.75rem; color:#666; margin-top:10px;">
            Tip: Long-Press the image above to save manually.
        </p>
    </div>
</div>

<script>
    const MY_M_K = "100110"; 
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzEtdCthyH_epfl947GqhDVcrftFYEQyXv11yqlRMRezgcGJsMdkOWOLkKY4a1mkmpi7Q/exec";

    let currentPartId="", currentPartName="", currentAction="", html5QrCode, scannedBatchId="";
    let isOrderValid=false, isPOValid=false, currentStockValue=0, poChoice="";
    let currentEditOrderCode = "", currentEditStatus = "";
    
    // Global to store the *generated* In-bound ID for filename on download
    let generatedInId = "";

    window.onload = () => { if(localStorage.getItem("warehouse_authenticated")==="true"){ document.getElementById('login-overlay').style.display='none'; document.getElementById('main-app').style.display='block'; fetchActiveOrders(); } };

    function checkPin() { if (document.getElementById('pin-input').value === MY_M_K) { localStorage.setItem("warehouse_authenticated", "true"); localStorage.setItem("warehouse_staff_name", document.getElementById('staff-name').value); location.reload(); } else alert("Denied"); }
    function logout() { localStorage.clear(); location.reload(); }
    function showPage(page) {
        document.getElementById('dashboard-menu').style.display='none'; document.getElementById('stock-page').style.display='none'; document.getElementById('order-page').style.display='none';
        if(html5QrCode && html5QrCode.isScanning) html5QrCode.stop();
        if(page==='menu') document.getElementById('dashboard-menu').style.display='block';
        if(page==='stock') { document.getElementById('stock-page').style.display='block'; startScanner(); }
        if(page==='order') document.getElementById('order-page').style.display='block';
    }

    function fetchActiveOrders() {
        const select = document.getElementById('purpose-order');
        // Show a loading state so staff knows the app is working
        select.innerHTML = '<option value="" disabled selected>⏳ Fetching Active Orders...</option>';
    
        fetch(`${GOOGLE_SCRIPT_URL}?mode=active_orders`)
            .then(res => {
                if (!res.ok) throw new Error("Server Error: " + res.status);
                return res.json();
            })
            .then(data => {
                // Check if the "orders" key exists in the returned JSON
                if (data.orders && data.orders.length > 0) {
                    let html = '<option value="" disabled selected>Select an Active Order...</option>';
                    data.orders.forEach(order => {
                        // Create a clean label: "Code - Customer (Product)"
                        html += `<option value="${order.code}">${order.code} - ${order.customer} (${order.product})</option>`;
                    });
                    select.innerHTML = html;
                } else {
                    select.innerHTML = '<option value="" disabled selected>❌ No Unfinished Orders Found</option>';
                }
            })
            .catch(err => {
                console.error("Order Fetch Failed:", err);
                select.innerHTML = '<option value="" disabled selected>⚠️ Connection Error. Try Again.</option>';
            });
    }

       function startScanner() {
        if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");
    
        // 1. Defining formats explicitly sometimes crashes older browsers. 
        // We'll use a safer list or let it default if needed.
        const formatsToSupport = [
            Html5QrcodeSupportedFormats.QR_CODE,
            Html5QrcodeSupportedFormats.EAN_13,
            Html5QrcodeSupportedFormats.CODE_128,
            Html5QrcodeSupportedFormats.CODE_39
        ];
    
        const config = { 
            fps: 20, // Increased for faster barcode tracking
            qrbox: function(viewfinderWidth, viewfinderHeight) {
                // Dynamic sizing: Wide for barcodes, tall enough for QR
                return {
                    width: viewfinderWidth * 0.8,
                    height: viewfinderHeight * 0.4
                };
            },
            // REMOVED fixed aspectRatio which causes most camera crashes
            videoConstraints: {
                facingMode: "environment"
                // We removed width/height ideals here to let the phone pick its native resolution
            }
        };
    
        html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            onScanSuccess,
            (errorMessage) => {
                // This prevents the "Turning off" loop by ignoring minor focus errors
                // console.log(errorMessage); 
            }
        ).catch(err => {
            console.error("Scanner Start Error:", err);
            // Fallback: Try starting with NO formats specified if the first attempt fails
            alert("Camera failed. Retrying in compatibility mode...");
            html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, onScanSuccess);
        });
    }
    
    function onScanSuccess(decodedText) {
    const proceed = () => {
        // Hide scanner and manual UI, show controls
        document.getElementById('scanner-view').style.display = 'none';
        document.getElementById('manual-entry-section').style.display = 'none';
        document.getElementById('controls').style.display = 'block';
        
        const isBatchCode = decodedText.includes('_');
        // If it's a batch, the Part ID is the first 6 characters
        currentPartId = isBatchCode ? decodedText.split('_')[0] : decodedText;
        scannedBatchId = isBatchCode ? decodedText : ""; 
        
        // Pick backend mode: batch_info for full codes, stock for 6-digits
        const mode = isBatchCode ? "batch_info" : "stock";

        // Pre-fill the removal reason if it's a batch
        if (isBatchCode) {
            document.getElementById('purpose-order').value = decodedText;
            // Note: If you have the dropdown enabled, you might want to 
            // set the dropdown to the matched value or show a 'Batch Override' message
        }

        fetch(`${GOOGLE_SCRIPT_URL}?mode=${mode}&id=${decodedText}`)
            .then(res => res.json())
            .then(data => {
                const display = document.getElementById('stock-display');
                if(data.found) {
                    currentPartName = data.name;
                    currentStockValue = Number(data.stock);
                    document.getElementById('item-name').innerText = "✅ " + data.name;
                    
                    if(isBatchCode) {
                        display.innerText = "Batch Remaining: " + data.stock;
                        document.getElementById('item-id').innerText = "Batch: " + decodedText;
                    } else {
                        display.innerText = "Total Stock: " + data.stock;
                        document.getElementById('item-id').innerText = "Part ID: " + currentPartId;
                    }
                    
                    display.style.color = currentStockValue < 10 ? "var(--warning)" : "var(--text)";
                    if(currentStockValue <= 0) { display.style.color = "var(--danger)"; display.innerText += " (EMPTY)"; }
                } else { 
                    alert("ID not found in database."); 
                    location.reload(); 
                }
            });
    };
    
    // Stop the scanner if it's running
    if(html5QrCode && html5QrCode.isScanning) {
        html5QrCode.stop().then(proceed).catch(proceed);
    } else {
        proceed();
    }
}

    function setActionMode(mode) {
        currentAction = mode;
        document.getElementById('action-selector').style.display='none'; 
        document.getElementById('movement-form').style.display='block';
        
        if (mode === 'IN') {
            document.getElementById('po-link-section').style.display = 'block';
            document.getElementById('order-link-section').style.display = 'none';
        } else {
            document.getElementById('po-link-section').style.display = 'none';
            document.getElementById('order-link-section').style.display = 'block';
            // Refresh the list whenever they go to the Removal screen
            fetchActiveOrders(); 
        }
    }

    function toggleScenario() { document.getElementById('contract-logic-block').style.display = (document.getElementById('addition-scenario').value === 'contract') ? 'block' : 'none'; updateCodePreview(); }
    function togglePOInput() { document.getElementById('po-input-block').style.display = document.getElementById('check-has-po').checked ? 'block' : 'none'; updateCodePreview(); }
    function toggleBatchSection() { const b = document.getElementById('check-batches').checked; document.getElementById('batch-number-input').style.display = b ? 'block' : 'none'; document.getElementById('batch-search-btn').style.display = b ? 'block' : 'none'; updateCodePreview(); }

    function updateCodePreview() {
        const preview = document.getElementById('code-preview');
        if (document.getElementById('addition-scenario').value === 'general') { preview.innerText = "Order ID: N/A"; return "N/A"; }
        const po = document.getElementById('check-has-po').checked ? (document.getElementById('po-number-input').value || "PO_PENDING") : "Temp";
        const share = document.getElementById('check-shared-po').checked ? "SHARED" : "UNIQUE";
        const batch = document.getElementById('check-batches').checked ? ("B" + document.getElementById('batch-number-input').value) : "Single";
        const code = `${currentPartId}_${po}_${share}_${batch}`;
        preview.innerText = "Order ID: " + code; return code;
    }

    function searchSharedPOs() {
        fetch(`${GOOGLE_SCRIPT_URL}?mode=search_shared_po`).then(res=>res.json()).then(data=>{
            const list = document.getElementById('search-results-list'); list.style.display = "block";
            if(data.results.length > 0) {
                let html = "<strong>Shared POs:</strong><ul>";
                data.results.forEach(i => { html += `<li onclick="applyPO('${i.po}')" style="color:var(--purple); cursor:pointer;">${i.po} <br><small>${i.desc}</small></li>`; });
                list.innerHTML = html + "</ul>";
            } else list.innerHTML = "No shared POs.";
        });
    }

    function applyPO(po) { document.getElementById('check-has-po').checked = true; document.getElementById('po-number-input').value = po; document.getElementById('po-input-block').style.display = 'block'; updateCodePreview(); }
    function searchBatches() {
        fetch(`${GOOGLE_SCRIPT_URL}?mode=batch_lookup&partId=${currentPartId}`).then(res=>res.json()).then(data=>{
            const list = document.getElementById('search-results-list'); list.style.display = "block";
            if(data.results.length > 0) { list.innerHTML = "<strong>Existing Batches:</strong><br>" + data.results.map(i => i.code).join("<br>"); } 
            else list.innerHTML = "No existing batches.";
        });
    }

    function handleReasonChange() {
        const r = document.getElementById('removal-reason').value;
        const block = document.getElementById('order-code-input-block');
        if (r === "For Making an Order") { block.style.display = 'block'; checkOrderSelection(); } else { block.style.display = 'none'; isOrderValid = true; }
    }

    function checkOrderSelection() { isOrderValid = document.getElementById('purpose-order').value !== ""; }

    function submitFinalData() {
        const qty = Number(document.getElementById('qty').value);
        if(currentAction==='OUT') {
            if(qty > currentStockValue) { alert("Not enough stock!"); return; }
            if(!isOrderValid) { alert("Pick active order!"); return; }
        }

        const btn = document.getElementById('final-submit-btn'); btn.disabled = true; btn.innerText = "⏳ Saving...";
        
        // --- FILENAME FIX ---
        // 1. Generate ID for IN transactions
        const targetInId = (currentAction === 'IN') ? updateCodePreview() : "";
        // 2. Store it globally so Download can use it
        generatedInId = (currentAction === 'IN') ? targetInId : "";

        const payload = {
            type: "STOCK_MOVE", partId: currentPartId, partName: currentPartName, action: currentAction, quantity: qty,
            staffName: localStorage.getItem("warehouse_staff_name"), purpose: document.getElementById('manual-purpose').value,
            orderCode: (currentAction==='OUT') ? (document.getElementById('removal-reason').value === "For Making an Order" ? document.getElementById('purpose-order').value : document.getElementById('removal-reason').value) : "",
            poValue: (currentAction==='IN') ? (document.getElementById('check-has-po').checked ? document.getElementById('po-number-input').value : "Temp") : "N/A",
            poDescription: (currentAction==='IN') ? document.getElementById('po-description').value : "",
            stockingOrderId: (currentAction==='IN') ? targetInId : scannedBatchId,
            wasted: (currentAction==='OUT' && document.getElementById('wasted-check').checked) ? "Yes" : ""
        };

        fetch(GOOGLE_SCRIPT_URL, { method:"POST", body: JSON.stringify(payload) }).then(()=> { 
            // 3. Conditional QR or reload
            if (currentAction === 'IN' && targetInId !== "N/A") { generateLabel(targetInId, currentPartName); } 
            else { alert("Saved!"); location.reload(); }
        }).catch(() => { alert("Error."); btn.disabled = false; });
    }

    function submitNewOrder() {
        const c = document.getElementById('cust-name').value;
        const p = document.getElementById('order-prod').value;
        const d = document.getElementById('order-deadline').value;
        const detailsVal = document.getElementById('order-details').value; // <--- GET THE VALUE
        const poVal = document.getElementById('order-po').value;
    
        if(!c || !p || !d){ 
            alert("Please fill in Customer, Product, and Deadline."); 
            return; 
        }
    
        document.getElementById('order-submit-btn').disabled = true;
        document.getElementById('order-submit-btn').innerText = "⏳ Creating...";
    
        fetch(GOOGLE_SCRIPT_URL, { 
            method: "POST", 
            body: JSON.stringify({ 
                type: "NEW_ORDER", 
                customer: c, 
                product: p, 
                deadline: d, 
                details: detailsVal, // <--- SEND AS 'details'
                poNumber: poVal 
            })
        })
        .then(res => res.json())
        .then(data => { 
            alert(`Order Created Successfully! Code: ${data.code}`); 
            location.reload(); 
        })
        .catch(err => {
            alert("Error creating order.");
            document.getElementById('order-submit-btn').disabled = false;
        });
    }

    // FETCH: Get the list of unfinished orders specifically for the management screen
    function fetchOrdersForUpdate() {
        const btn = event.target;
        const select = document.getElementById('unfinished-order-list');
        
        btn.disabled = true;
        btn.innerText = "⏳ Fetching...";
    
        fetch(`${GOOGLE_SCRIPT_URL}?mode=active_orders`)
            .then(res => res.json())
            .then(data => {
                btn.disabled = false;
                btn.innerText = "📋 Refresh List";
                select.style.display = "block";
                
                select.innerHTML = '<option value="" disabled selected>Choose an Unfinished Order...</option>';
                if (data.orders && data.orders.length > 0) {
                    data.orders.forEach(order => {
                        select.innerHTML += `<option value="${order.code}">${order.code} - ${order.customer}</option>`;
                    });
                } else {
                    alert("No unfinished orders found in the system.");
                    select.style.display = "none";
                }
            })
            .catch(err => {
                alert("Connection error. Check script URL.");
                btn.disabled = false;
                btn.innerText = "📋 Fetch Unfinished List";
            });
    }
    
    // FIND: Reusable function that populates the edit box
    function findOrderForEdit(id) {
        if (!id) return;
    
        fetch(`${GOOGLE_SCRIPT_URL}?mode=order_lookup&id=${id}`)
            .then(res => res.json())
            .then(data => {
                if (data.found) {
                    currentEditOrderCode = id;
                    currentEditStatus = data.status;
                    
                    document.getElementById('edit-id-display').innerText = id;
                    document.getElementById('edit-cust').innerText = data.customer;
                    document.getElementById('edit-prod').innerText = data.product;
                    document.getElementById('edit-status').innerText = data.status;
                    document.getElementById('order-edit-controls').style.display = 'block';
                    
                    const btn = document.getElementById('status-toggle-btn');
                    btn.innerText = data.status === "Unfinished" ? "✅ Mark as Finished" : "🔄 Re-open Order";
                    btn.style.background = data.status === "Unfinished" ? "var(--success)" : "var(--warning)";
                    btn.style.color = "white";
                    
                    // Scroll to the controls so the staff sees them on mobile
                    document.getElementById('order-edit-controls').scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("Order code " + id + " not found.");
                }
            });
    }

    function toggleOrderStatus() {
        const newStatus = currentEditStatus === "Unfinished" ? "Finished" : "Unfinished";
        const btn = document.getElementById('status-toggle-btn'); btn.disabled = true; btn.innerText = "⏳ Updating...";
        fetch(GOOGLE_SCRIPT_URL, { method: "POST", body: JSON.stringify({ type: "UPDATE_ORDER_STATUS", orderCode: currentEditOrderCode, newStatus: newStatus })
        }).then(() => { alert("Status updated to " + newStatus); location.reload(); });
    }

    function showManual() { document.getElementById('scanner-view').style.display='none'; document.getElementById('manual-entry-section').style.display='block'; }
    function showScanner() { document.getElementById('manual-entry-section').style.display='none'; document.getElementById('scanner-view').style.display='block'; startScanner(); }
    function handleManualSubmit() {
        const input = document.getElementById('manual-code-input').value.trim();
        
        if (!input) {
            alert("Please enter a Code.");
            return;
        }
    
        // Validation logic
        const isBatch = input.includes('_');
        const isGeneralPart = (input.length === 6 && !isNaN(input));
    
        if (isBatch || isGeneralPart) {
            onScanSuccess(input); // Pass the manual text to the existing scan logic
        } else {
            alert("Invalid format. Please enter a 6-digit Part Code or a full Stocking Order ID.");
        }
    }        
    // Ensure generateLabel populates the variables correctly
    function generateLabel(orderId, partName) {
        generatedInId = orderId;
        const modal = document.getElementById('qr-modal');
        const captureArea = document.getElementById('label-capture-area');
        const qrContainer = document.getElementById('qrcode-canvas');
        const finalImg = document.getElementById('final-combined-image');
    
        modal.style.display = 'flex';
        captureArea.style.display = 'block'; 
        finalImg.style.display = 'none'; 
        qrContainer.innerHTML = ""; 
    
        // Generate QR
        new QRCode(qrContainer, {
            text: orderId,
            width: 300, // Higher resolution for capture
            height: 300,
            correctLevel : QRCode.CorrectLevel.H
        });
        
        document.getElementById('label-text').innerHTML = `${partName}<br>${orderId}`;
    
        setTimeout(() => {
            html2canvas(captureArea, {
                backgroundColor: "#ffffff",
                scale: 2 
            }).then(originalCanvas => {
                // --- TRUE ROTATION LOGIC (90° CCW) ---
                const rotateCanvas = document.createElement('canvas');
                const ctx = rotateCanvas.getContext('2d');
    
                // Swap width and height for a 90-degree turn
                rotateCanvas.width = originalCanvas.height;
                rotateCanvas.height = originalCanvas.width;
    
                // Move to center, rotate, and draw
                ctx.translate(0, originalCanvas.width);
                ctx.rotate(-Math.PI / 2); // 90 degrees CCW
                ctx.drawImage(originalCanvas, 0, 0);
    
                // Convert to final image
                const rotatedDataUrl = rotateCanvas.toDataURL("image/png");
                
                captureArea.style.display = 'none';
                finalImg.src = rotatedDataUrl;
                finalImg.style.display = 'block';
            });
        }, 600);
    }

    // --- 3. THE NEW DOWNLOAD SCRIPT ---
    function downloadQR(event) {
        if (event) event.preventDefault();
        const finalImg = document.getElementById('final-combined-image');
        
        if (!finalImg.src) {
            alert("Image still generating...");
            return;
        }
    
        const filename = `Label_${generatedInId || 'Batch'}.png`;
        const link = document.createElement('a');
        link.href = finalImg.src;
        link.download = filename;
    
        // Check for iOS
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        if (isIOS) {
            alert("iOS detected: Please Long-Press the image and select 'Save to Photos'.");
        } else {
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    }

    function performDownload(url) {
        // Filename Logic: IN generated ID, or OUT scanned batch ID
        let rawFilenamePart = (currentAction === 'IN') ? generatedInId : scannedBatchId;
        if (!rawFilenamePart) rawFilenamePart = currentPartId; // fallback

        // Sanitize part of the filename (remove special chars/spaces)
        const sanitizedFilenamePart = rawFilenamePart.replace(/[^\w.-]/g, '_');
        const filename = `Batch_${sanitizedFilenamePart}.png`;

        const link = document.createElement('a');
        link.href = url; link.download = filename;
        
        // MOBILE COMPATIBILITY: program downloads are often strictly blocked.
        // detect iOS to provide window.open fallback and instructions.
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;

        if(isIOS){
            // programme download direct blocked by iOS. Open in new tab for user to save manually.
            window.open(url, "_blank");
            alert("⚠️ iOS Blocks Automatic Downloads.\n\nThe QR code image has opened in a new tab.\n\nPLEASE Long-press (tap and hold) on the QR and select 'Add to Photos'.");
        } else {
            // Standard hidden link download (Android/Chrome/Firefox/Desktop)
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            console.log("Download triggered:", filename);
        }
    }

    function handleDownloadError() {
        alert("Sorry, we couldn't automatically save the image.\n\nPlease Long-press (tap and hold) on the QR code displayed on the screen and select 'Save Image' or 'Add to Photos'.");
    }
</script>
